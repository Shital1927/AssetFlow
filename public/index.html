<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CRUD App</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 640px;
    margin: 48px auto;
    padding: 0 20px;
    background: #f7f7f8;
    color: #1a1a1a;
  }
  h1 { font-size: 1.6rem; margin-bottom: 4px; }
  p.subtitle { color: #666; margin-top: 0; margin-bottom: 24px; }

  .form-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  input[type="text"] {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 0.95rem;
  }
  button {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    cursor: pointer;
    font-weight: 600;
  }
  .btn-primary { background: #5b4fcf; color: white; }
  .btn-primary:hover { background: #4a3fb8; }
  .btn-danger { background: #fdecea; color: #d0342c; }
  .btn-danger:hover { background: #fbdbd8; }
  .btn-secondary { background: #eee; color: #333; }
  .btn-secondary:hover { background: #e0e0e0; }

  ul { list-style: none; padding: 0; margin: 0; }
  li {
    background: white;
    border: 1px solid #eee;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .item-name { font-weight: 500; }
  .item-status {
    font-size: 0.75rem;
    color: #888;
    background: #f0f0f0;
    padding: 2px 8px;
    border-radius: 6px;
    margin-left: 8px;
  }
  .actions { display: flex; gap: 6px; }
  .empty {
    text-align: center;
    color: #999;
    padding: 40px 0;
  }
  .edit-input {
    flex: 1;
    padding: 6px 8px;
    border: 1px solid #ccc;
    border-radius: 6px;
    margin-right: 8px;
  }
</style>
</head>
<body>
  <h1>CRUD App</h1>
  <p class="subtitle">Create, read, update, and delete items — backed by MongoDB.</p>

  <div class="form-row">
    <input type="text" id="nameInput" placeholder="Add a new item..." />
    <button class="btn-primary" onclick="createItem()">Add</button>
  </div>

  <ul id="itemList"></ul>

  <script src="app.js"></script>
</body>
</html>
