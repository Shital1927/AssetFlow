<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetFlow | Register Organization</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forms.css">
</head>

<body class="glass"
    style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #eef3ff; padding: 20px 0;">

    <div class="auth-container animate-fade-up" style="max-width: 1100px;">

        <div class="auth-left">
            <h1 style="color: white;"><i class="fa-solid fa-cubes"></i> AssetFlow</h1>
            <p>Empower your operations team. Set up tracking parameters, establish asset categories, and build employee
                profiles instantly.</p>
            <div style="margin-top: 40px; font-size: 50px; text-align: center; color: rgba(255,255,255,0.25);">
                <i class="fa-solid fa-building-circle-check"></i>
            </div>
        </div>

        <div class="auth-right" style="padding: 40px 60px;">
            <h2>Register Organization</h2>
            <p class="subtitle">Establish your corporate workspace in minutes.</p>

            <form id="signupForm" action="login.html" method="GET">
                <div class="form-row">
                    <div class="form-group">
                        <label for="orgName">Organization Name</label>
                        <input type="text" id="orgName" placeholder="Acme Corporation" required>
                    </div>
                    <div class="form-group">
                        <label for="orgSize">Company Size</label>
                        <select id="orgSize" required>
                            <option value="" disabled selected>Select size</option>
                            <option>1-50 employees</option>
                            <option>51-200 employees</option>
                            <option>201-1000 employees</option>
                            <option>1000+ employees</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="adminName">Administrator Full Name</label>
                    <input type="text" id="adminName" placeholder="Het Patel" required>
                </div>

                <div class="form-group">
                    <label for="email">Work Email</label>
                    <input type="email" id="email" placeholder="admin@organization.com" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 24px;">
                    <label
                        style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer; font-weight: normal; font-size: 13px;">
                        <input type="checkbox" style="width: auto; margin-top: 4px;" required>
                        I agree to AssetFlow IT administration terms and privacy rules.
                    </label>
                </div>

                <button type="submit" class="primary-btn" style="width: 100%;">Create Core Account</button>
            </form>

            <div class="auth-form-links">
                Already registered? <a href="login.html">Sign In here</a>
            </div>
        </div>

    </div>

</body>

</html>
