<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetFlow | Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forms.css">
    <style>
        .step {
            display: none;
        }

        .step.active {
            display: block;
        }

        .otp-inputs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .otp-inputs input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 0px;
            padding: 0;
        }
    </style>
</head>

<body class="glass"
    style="display: flex; align-items: center; justify-content: center; height: 100vh; background: #eef3ff;">

    <div class="auth-container animate-fade-up" style="max-width: 550px; min-height: 500px;">

        <div class="auth-right" style="flex: 1; padding: 50px;">
            <div class="logo" style="margin-bottom: 30px; justify-content: center;">
                <i class="fa-solid fa-cubes" style="font-size: 28px; color: var(--primary);"></i>
                <h2 style="font-size: 22px; color: var(--text-primary);">AssetFlow</h2>
            </div>

            <!-- STEP 1: Enter Email -->
            <div id="step1" class="step active">
                <h2>Forgot Password?</h2>
                <p class="subtitle">Enter the email matching your admin profile to receive verification codes.</p>

                <form id="formEmail" onsubmit="event.preventDefault(); goToStep(2);">
                    <div class="form-group">
                        <label for="recoveryEmail">Registered Email</label>
                        <input type="email" id="recoveryEmail" placeholder="admin@organization.com" required>
                    </div>
                    <button type="submit" class="primary-btn" style="width: 100%;">Send Verification Code</button>
                </form>
            </div>

            <!-- STEP 2: Enter OTP -->
            <div id="step2" class="step">
                <h2>Verify Identity</h2>
                <p class="subtitle">We've sent a 4-digit code to your workspace inbox.</p>

                <form id="formOTP" onsubmit="event.preventDefault(); goToStep(3);">
                    <div class="otp-inputs">
                        <input type="text" maxlength="1" required onkeyup="moveNext(this, 'otp2')">
                        <input type="text" id="otp2" maxlength="1" required onkeyup="moveNext(this, 'otp3')">
                        <input type="text" id="otp3" maxlength="1" required onkeyup="moveNext(this, 'otp4')">
                        <input type="text" id="otp4" maxlength="1" required>
                    </div>
                    <button type="submit" class="primary-btn" style="width: 100%;">Confirm Code</button>
                    <p style="text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-secondary);">
                        Didn't read code? <a href="#" onclick="goToStep(1)"
                            style="color: var(--primary); text-decoration: none; font-weight: 600;">Resend</a>
                    </p>
                </form>
            </div>

            <!-- STEP 3: Setup Password -->
            <div id="step3" class="step">
                <h2>New Credentials</h2>
                <p class="subtitle">Update security variables for your admin profile.</p>

                <form id="formReset" action="login.html" method="GET">
                    <div class="form-group">
                        <label for="newPass">New Password</label>
                        <input type="password" id="newPass" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPass">Re-enter Password</label>
                        <input type="password" id="confirmPass" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="primary-btn" style="width: 100%;">Save Password & Sign In</button>
                </form>
            </div>

            <div class="auth-form-links" style="margin-top: 35px;">
                Return back to <a href="login.html">Sign In Screen</a>
            </div>
        </div>

    </div>

    <script>
        function goToStep(stepNum) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + stepNum).classList.add('active');
        }

        function moveNext(current, nextId) {
            if (current.value.length === 1) {
                document.getElementById(nextId).focus();
            }
        }
    </script>
</body>

</html>
